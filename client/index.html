<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!--
      NOTE: title, description, canonical, og:*, twitter:*, robots, and ld+json
      are ALL injected server-side by server/seo.ts for every route.
      Do NOT add them here — they will create duplicate tags that hurt SEO.
      The seoMiddleware strips and re-injects them with per-page values.
    -->

    <!-- OG image dimensions (safe to keep — not duplicated by seo.ts) -->
    <meta property="og:image" content="https://quantumsurety.bond/QS_OG_2.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Quantum Surety — AI-Powered Texas Surety Bonds" />
    <meta name="twitter:image" content="https://quantumsurety.bond/QS_OG_2.png" />
    <meta name="twitter:site" content="@quantumsurety" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QGDQ6JDMMH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QGDQ6JDMMH', {
        page_title: document.title,
        page_location: window.location.href,
        send_page_view: true
      });
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/QS_Logo.png" />
    <link rel="apple-touch-icon" href="/QS_Logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script
      data-id="c-252daa26beb9"
      src="https://widget.gista.co/embed.min.js"
      defer
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
